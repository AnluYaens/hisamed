services:
  app:
    build:
      context: .
      target: production
    image: ${APP_IMAGE:-clinica-mvp:latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  migrate:
    build:
      context: .
      target: build
    profiles:
      - tools
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: pnpm db:migrate
