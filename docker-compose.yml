services:
  db:
    image: postgres:16-alpine
    container_name: clinica_mvp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinica
      POSTGRES_PASSWORD: clinica_dev
      POSTGRES_DB: clinica_mvp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica -d clinica_mvp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
